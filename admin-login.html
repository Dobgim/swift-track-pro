<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — SwiftTrack Pro</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

<div class="admin-login-page">
  <div class="admin-login-box">

    <!-- Logo -->
    <div class="admin-login-logo">
      <div class="logo-icon" style="background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));width:3.5rem;height:3.5rem;border-radius:.65rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1rem"><i data-lucide="package" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i></div>
      <h2 style="text-align:center;font-size:1.6rem;color:var(--navy);margin-bottom:.4rem">SwiftTrack Pro</h2>
      <p style="text-align:center;font-size:.9rem;color:var(--gray-400);margin-bottom:2rem">Admin Portal — Authorized Access Only</p>
    </div>

    <!-- Alert -->
    <div id="login-msg"></div>

    <!-- Form -->
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input
          type="email"
          id="login-email"
          class="form-control"
          placeholder="admin@swifttrackpro.com"
          required
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div style="position:relative">
          <input
            type="password"
            id="login-password"
            class="form-control"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            style="padding-right:3rem"
          />
          <button
            type="button"
            id="toggle-password"
            style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:1.1rem"
            aria-label="Toggle password visibility"
          ><i data-lucide="eye" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i></button>
        </div>
      </div>

      <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;padding:1rem;font-size:1rem">
        <i data-lucide="lock" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i> Sign In to Dashboard
      </button>
    </form>

    <!-- Security Notice -->
    <div style="margin-top:1.5rem;padding:.9rem;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.8rem;color:var(--gray-400);text-align:center">
      <i data-lucide="lock" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i> This is a secure admin area. Unauthorized access is strictly prohibited.
    </div>

    <div style="text-align:center;margin-top:1.25rem">
      <a href="index.html" style="font-size:.85rem;color:var(--gray-400)">← Back to Website</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://blitracqgaggxuypqbpo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaXRyYWNxZ2FnZ3h1eXBxYnBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODU1MjgsImV4cCI6MjA4OTU2MTUyOH0.vAwSRoqGk-nL0BfnXL6-rSSM6MQS6dWcoghLimdVIVs';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Redirect if already logged in
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'admin-dashboard.html';
  })();

  // Toggle password visibility
  document.getElementById('toggle-password').addEventListener('click', () => {
    const input = document.getElementById('login-password');
    const btn   = document.getElementById('toggle-password');
    if (input.type === 'password') { input.type = 'text';     btn.textContent = '<i data-lucide="eye-off" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i>'; }
    else                           { input.type = 'password'; btn.textContent = '<i data-lucide="eye" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i>'; }
  });

  // Login form submit
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('login-btn');
    const msg   = document.getElementById('login-msg');
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;

    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    btn.disabled  = true;
    msg.innerHTML = '';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;

      msg.innerHTML = `<div class="alert alert-success"><i data-lucide="check" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i> Login successful! Redirecting to dashboard…</div>`;
      setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 900);

    } catch (err) {
      msg.innerHTML = `<div class="alert alert-error"><i data-lucide="x" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i> ${err.message || 'Login failed. Please try again.'}</div>`;
      btn.innerHTML = '<i data-lucide="lock" style="width:1.2em; height:1.2em; vertical-align:-0.2em; display:inline-block;"></i> Sign In to Dashboard';
      btn.disabled  = false;
    }
  });
</script>

  <!-- Lucide SVG Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
